# soupault.toml

[settings]
  site_dir = "site"
  build_dir = "build"
  default_template_file = "templates/main.html"
  default_content_selector = "main"
  complete_page_selector = "html"
  generator_mode = true
  clean_urls = true
  page_file_extensions = ["htm", "html"]
  markdown_extensions = ["md"]
  keep_doctype = true
  pretty_print_html = true
  plugin_discovery = true # Or load explicitly
  plugin_dirs = ["plugins"] # Default

[templates.hugin_project_config]
  file = "templates/layout_hugin.html"
  section = "hugin/"
  include_subsections = true
  content_selector = "main"

[templates.ndarray_project_config]
  file = "templates/layout_ndarray.html"
  section = "ndarray/"
  include_subsections = true
  content_selector = "main"

[templates.rune_project_config]
  file = "templates/layout_rune.html"
  section = "rune/"
  include_subsections = true
  content_selector = "main"

[templates.quill_project_config]
  file = "templates/layout_quill.html"
  section = "quill/"
  include_subsections = true
  content_selector = "main"

[templates.kaun_project_config]
  file = "templates/layout_kaun.html"
  section = "kaun/"
  include_subsections = true
  content_selector = "main"

[templates.sowilo_project_config]
  file = "templates/layout_sowilo.html"
  section = "sowilo/"
  include_subsections = true
  content_selector = "main"

[widgets.page_title]
  widget = "title"
  selector = "h1"
  default = "Raven Ecosystem"
  append = " - Raven"
  # keep = false # Add if you want to force overwrite existing <title> tags

[widgets.clean_empty_paragraphs]
  widget = "delete_element"
  selector = "p:empty"

[widgets.breadcrumbs]
  widget = "breadcrumbs"
  selector = "#breadcrumbs"
  # min_depth = 1 # Optional: if you don't want breadcrumbs on pages like /foo.html (depth 0)
  between = " / "
  exclude_page = "index.html" # Exclude from the main site landing page

[widgets.include_footer]
  widget = "include"
  file = "templates/partials/footer.html"
  selector = "#footer"
  action = "replace_element"

[widgets.style_documentation_main_tag]
  widget = "style_doc_main" # Lua filename without .lua
  selector = "main"         # The widget will operate on the <main> tag
  # No need for path_regex here, the plugin logic handles which pages to affect.
  # This widget should run after content is inserted but before final HTML generation.
  # Its default order should be fine.