[settings]
site_dir = "."
build_dir = "build"
default_template = "main.html"

[preprocessors]

[widgets]

# Navigation breadcrumbs
[widgets.breadcrumbs]
  widget = "breadcrumbs"
  selector = "#breadcrumbs"
  prepend_index = false
  between = " / "

# Page title from h1
[widgets.page_title]
  widget = "title"
  selector = "h1"
  default = "Raven"
  append = " - Raven"

# Clean up empty paragraphs
[widgets.clean_empty]
  widget = "delete_element"
  selector = "p:empty"

# Template selection based on page path
[widgets.template_selector]
  widget = "template"
  default_template = "main.html"

[index]
# Don't generate index pages automatically
index_page = "index.html"
index_file = "index.html"
section_index_file = "index.html"

[templates]
# Template settings
default_template_file = "main.html"
template_dir = "templates"
content_selector = "main"

# Use landing template for home page
[page.index]
  template = "landing.html"

# Use project template for project pages
[page.ndarray/index]
  template = "project.html"
  
[page.hugin/index]
  template = "project.html"
  
[page.rune/index]
  template = "project.html"
  
[page.quill/index]
  template = "project.html"

[plugins]
# Site-wide plugins can be configured here